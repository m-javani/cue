node_id: node1
data_dir: ./data

cluster:
  listen_addr: "0.0.0.0"
  quic_port: 8323
  cert_path: "./certs/node1.pem"
  key_path: "./certs/node1_key.pem"
  ca_path: "./certs/ca_cert.pem"
  initial_voters: ["node1","node2","node3"]
  snapshot_interval_sec: 60
  snapshot_trigger_count: 10000
  wal_flush_threshold: 1000
  dlq_max_size_bytes: 10485760  # 10MB
  raft_tick_ms: 100 # 100ms
  raft_heartbeat_tick: 3 # with 100ms tick = 300ms
  raft_election_tick: 30 # with 100ms tick = 3 seconds
  discovery_kind: "static"  # or "http"
  discovery_yml_path: "./discovery.yml"  # required for static
  discovery_http_host: "" # "http://discovery-service:8080"  required for http
  
proxy:
  addr: "0.0.0.0"
  port: 8322
  cert_path: "./certs/node1.pem"
  key_path: "./certs/node1_key.pem"
  ca_path: "./certs/ca_cert.pem"

wal:
  compact_after_bytes: 104857600  # 100MB
  sync_interval: "1s"

logging:
  level: "debug"      # debug, info, warn, error
  format: "json"     # json or text
  output_path: "stdout"  # stdout, stderr, or file path

partition:
  active_queue_capacity: 1000000
  max_retries: 3
  max_backoff_sec: 2
  dispatch_batch_size: 128
  dlq_max_bytes: 10485760
  dlq_max_age_ms: 86400000

api:
  listen_addr: "0.0.0.0"
  api_port: 8321
  token_path: "./configs/auth.yml"
